<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
 <defs><marker id="a" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#595959"/></marker></defs>
 <style>text{font-family:Arial,sans-serif;fill:#242424}.t{font-size:40px;font-weight:700}.s{font-size:19px;fill:#666}.h{font-size:18px;font-weight:700}.b{font-size:14px;fill:#555}.stage{fill:#fff;stroke:#d0d0d0;stroke-width:2}.agent{fill:#f4f0ff;stroke:#8067c7;stroke-width:2}.human{fill:#fff8c5;stroke:#cfb400;stroke-width:2}.fact{fill:#e8f5ed;stroke:#58916d;stroke-width:2}.dark{fill:#242424}.white{fill:#fff}.line{stroke:#595959;stroke-width:3;fill:none;marker-end:url(#a)}.loop{stroke:#b29a00;stroke-width:3;fill:none;stroke-dasharray:8 6;marker-end:url(#a)}</style>
 <rect width="1600" height="900" fill="#fbfbfa"/><rect width="18" height="900" fill="#ffe600"/>
 <text x="70" y="74" class="t">How a Legal Entity dataset becomes a governed data product</text><text x="70" y="110" class="s">A connected Agent-to-Human journey with deterministic evidence and explicit approval gates.</text>
 <rect x="70" y="150" width="325" height="515" rx="18" class="stage"/><text x="95" y="187" class="h">1. INTAKE</text>
 <rect x="95" y="215" width="275" height="105" rx="14" class="agent"/><text x="115" y="248" class="h">Intake &amp; Discovery Agent</text><text x="115" y="278" class="b">Prepares summary and</text><text x="115" y="301" class="b">bounded questions</text>
 <path d="M232 320V355" class="line"/><rect x="95" y="360" width="275" height="105" rx="14" class="human"/><text x="115" y="393" class="h">Human Data Steward</text><text x="115" y="423" class="b">Confirms purpose, owner,</text><text x="115" y="446" class="b">frequency and answers</text>
 <path d="M232 465V500" class="line"/><rect x="95" y="505" width="275" height="110" rx="14" class="fact"/><text x="115" y="538" class="h">Authorized context</text><text x="115" y="568" class="b">Typed Intake + recorded</text><text x="115" y="591" class="b">Human answers</text>

 <rect x="445" y="150" width="390" height="515" rx="18" class="stage"/><text x="470" y="187" class="h">2. ASSESS &amp; REMEDIATE</text>
 <rect x="470" y="215" width="340" height="82" rx="14" class="fact"/><text x="490" y="246" class="h">Deterministic profiling</text><text x="490" y="274" class="b">Counts, formats, duplicates and drift</text>
 <path d="M640 297V322" class="line"/>
 <rect x="470" y="327" width="162" height="115" rx="14" class="agent"/><text x="487" y="357" class="h">Profiling &amp;</text><text x="487" y="380" class="h">Quality Agent</text><text x="487" y="411" class="b">Rules and priorities</text>
 <rect x="648" y="327" width="162" height="115" rx="14" class="agent"/><text x="665" y="357" class="h">Classification</text><text x="665" y="380" class="h">&amp; Risk Agent</text><text x="665" y="411" class="b">Handling and risk</text>
 <path d="M640 442V475" class="line"/><rect x="470" y="480" width="340" height="135" rx="14" class="human"/><text x="490" y="512" class="h">Human Data Steward</text><text x="490" y="542" class="b">Critical defect? Supply a corrected version.</text><text x="490" y="566" class="b">Privacy concern? Decide handling.</text><text x="490" y="590" class="b">Clean evidence? Approve Assessment.</text>

 <rect x="885" y="150" width="285" height="515" rx="18" class="stage"/><text x="910" y="187" class="h">3. CONTRACT</text>
 <rect x="910" y="215" width="235" height="125" rx="14" class="agent"/><text x="928" y="248" class="h">Data Contract &amp;</text><text x="928" y="271" class="h">Remediation Agent</text><text x="928" y="302" class="b">Schema, mappings, rules,</text><text x="928" y="325" class="b">refresh, SLA and actions</text>
 <path d="M1028 340V390" class="line"/><rect x="910" y="395" width="235" height="125" rx="14" class="human"/><text x="928" y="428" class="h">Human Data Steward</text><text x="928" y="458" class="b">Reviews business terms</text><text x="928" y="481" class="b">and approves the exact</text><text x="928" y="504" class="b">Contract version</text>
 <path d="M1028 520V555" class="line"/><rect x="910" y="560" width="235" height="55" rx="12" class="fact"/><text x="928" y="594" class="h">Approved Contract</text>

 <rect x="1220" y="150" width="310" height="515" rx="18" class="stage"/><text x="1245" y="187" class="h">4. PUBLISH &amp; MONITOR</text>
 <rect x="1245" y="215" width="260" height="125" rx="14" class="agent"/><text x="1263" y="248" class="h">Publication &amp;</text><text x="1263" y="271" class="h">Monitoring Agent</text><text x="1263" y="302" class="b">Packages catalog metadata</text><text x="1263" y="325" class="b">and explains later changes</text>
 <path d="M1375 340V375" class="line"/><rect x="1245" y="380" width="260" height="105" rx="14" class="human"/><text x="1263" y="413" class="h">Human Data Steward</text><text x="1263" y="443" class="b">Approves the exact package</text><text x="1263" y="466" class="b">before tools may run</text>
 <path d="M1375 485V520" class="line"/><rect x="1245" y="525" width="260" height="90" rx="14" class="fact"/><text x="1263" y="558" class="h">Governed MCP publish</text><text x="1263" y="588" class="b">Simulated catalog draft</text>

 <path d="M395 405H440" class="line"/><path d="M835 405H880" class="line"/><path d="M1170 405H1215" class="line"/>
 <path d="M640 615V730H445V675" class="loop"/><text x="465" y="756" class="b">Corrected CSV creates a new version and repeats Assessment</text>
 <path d="M1375 615V795H640V670" class="loop"/><text x="900" y="821" class="b">Next source version returns to Assessment; prior descendants become stale</text>
 <rect x="70" y="840" width="1460" height="42" rx="10" class="dark"/><text x="95" y="867" font-size="15" class="white">CONTROL PLANE: current prerequisites - versions - deterministic stops - Human approvals - invalidation - tool authority - audit</text>
</svg>
