<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1040" viewBox="0 0 1800 1040" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Data Product Marketplace Architecture</title>
  <desc id="desc">A platform-agnostic architecture showing Data Stewardship onboarding, enterprise catalog, certification, marketplace discovery agents, MCP tools, consumers and feedback loop.</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#059669"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}
      .title{font:800 42px Arial, sans-serif;fill:#0f172a}
      .subtitle{font:400 22px Arial, sans-serif;fill:#334155}
      .section{font:800 18px Arial, sans-serif;fill:#0f172a;letter-spacing:.8px}
      .label{font:800 20px Arial, sans-serif;fill:#0f172a}
      .small{font:400 15px Arial, sans-serif;fill:#475569}
      .tiny{font:400 13px Arial, sans-serif;fill:#64748b}
      .box{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}
      .producer{fill:#ecfeff;stroke:#0891b2;stroke-width:2.5}
      .catalog{fill:#eff6ff;stroke:#2563eb;stroke-width:2.5}
      .market{fill:#f0fdf4;stroke:#16a34a;stroke-width:2.5}
      .agent{fill:#fff7ed;stroke:#f97316;stroke-width:2.5}
      .control{fill:#f5f3ff;stroke:#7c3aed;stroke-width:3}
      .mcp{fill:#fefce8;stroke:#ca8a04;stroke-width:2.5}
      .human{fill:#fdf2f8;stroke:#db2777;stroke-width:2.5}
      .flow{fill:none;stroke:#475569;stroke-width:3;marker-end:url(#arrow)}
      .blueFlow{fill:none;stroke:#2563eb;stroke-width:3;marker-end:url(#arrowBlue)}
      .greenFlow{fill:none;stroke:#059669;stroke-width:3;marker-end:url(#arrowGreen)}
      .dash{fill:none;stroke:#64748b;stroke-width:2.5;stroke-dasharray:8 8;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect width="1800" height="1040" class="bg"/>
  <rect x="0" y="0" width="18" height="1040" fill="#2563eb"/>

  <text x="60" y="72" class="title">Agentic Data Product Marketplace Discovery</text>
  <text x="60" y="110" class="subtitle">Governed onboarding creates trusted data products; marketplace Agents help consumers discover, trust, request and improve them.</text>

  <text x="60" y="165" class="section">PRODUCER SIDE: GOVERNED DATA PRODUCT CREATION</text>
  <rect x="60" y="190" width="310" height="120" rx="22" class="producer"/>
  <text x="90" y="232" class="label">Source datasets</text>
  <text x="90" y="263" class="small">Files, APIs, warehouse, lakehouse</text>
  <text x="90" y="288" class="tiny">External or internal source evidence</text>

  <rect x="450" y="190" width="380" height="120" rx="22" class="producer"/>
  <text x="480" y="232" class="label">Data Stewardship Workbench</text>
  <text x="480" y="263" class="small">Profile, assess, classify, contract</text>
  <text x="480" y="288" class="tiny">Agents prepare; Human Steward approves</text>

  <rect x="910" y="190" width="330" height="120" rx="22" class="catalog"/>
  <text x="940" y="232" class="label">Enterprise Data Catalog</text>
  <text x="940" y="263" class="small">Metadata, schema, quality, lineage</text>
  <text x="940" y="288" class="tiny">Governed product evidence store</text>

  <rect x="1320" y="190" width="330" height="120" rx="22" class="market"/>
  <text x="1350" y="232" class="label">Certification + Listing</text>
  <text x="1350" y="263" class="small">Marketplace-readiness decision</text>
  <text x="1350" y="288" class="tiny">Not every catalog asset is listed</text>

  <path class="flow" d="M370 250 L450 250"/>
  <path class="flow" d="M830 250 L910 250"/>
  <path class="flow" d="M1240 250 L1320 250"/>

  <text x="60" y="382" class="section">CONSUMER SIDE: DISCOVERY, ACCESS AND FEEDBACK</text>
  <rect x="60" y="408" width="420" height="130" rx="24" class="human"/>
  <text x="90" y="452" class="label">Data Consumers</text>
  <text x="90" y="484" class="small">Analysts, applications, data scientists, AI Agents</text>
  <text x="90" y="512" class="tiny">Browse marketplace UI or ask conversational questions</text>

  <rect x="560" y="408" width="430" height="130" rx="24" class="market"/>
  <text x="590" y="452" class="label">Searchable Data Product Marketplace</text>
  <text x="590" y="484" class="small">Certified products, trust signals, access entry point</text>
  <text x="590" y="512" class="tiny">Product cards, filters, comparison and request flows</text>

  <rect x="1080" y="408" width="570" height="130" rx="24" class="agent"/>
  <text x="1110" y="452" class="label">Specialist Marketplace Agents</text>
  <text x="1110" y="484" class="small">Search, intent, recommendation, curation, access, lineage, quality, feedback</text>
  <text x="1110" y="512" class="tiny">Agents reason over governed catalog evidence; they do not bypass policy</text>

  <path class="greenFlow" d="M480 473 L560 473"/>
  <path class="greenFlow" d="M990 473 L1080 473"/>
  <path class="dash" d="M1485 310 L1485 408"/>

  <text x="60" y="610" class="section">CONTROL PLANE: AUTHORITY, POLICY, EVIDENCE AND TOOL GOVERNANCE</text>
  <rect x="60" y="635" width="1590" height="150" rx="28" class="control"/>
  <text x="95" y="680" class="label">Marketplace Control Plane</text>
  <text x="95" y="714" class="small">Controls visibility, certification state, recommendation limits, access routing, approvals, model/tool execution, version authority and audit.</text>
  <text x="95" y="746" class="tiny">Same principle as the Data Stewardship Workbench: Agents prepare recommendations; governed services authorize state changes and tool calls.</text>

  <rect x="140" y="815" width="220" height="90" rx="18" class="mcp"/>
  <text x="165" y="850" class="label">Catalog Search MCP</text>
  <text x="165" y="878" class="tiny">Search products and metadata</text>

  <rect x="405" y="815" width="220" height="90" rx="18" class="mcp"/>
  <text x="430" y="850" class="label">Quality + SLA MCP</text>
  <text x="430" y="878" class="tiny">Freshness and trust signals</text>

  <rect x="670" y="815" width="220" height="90" rx="18" class="mcp"/>
  <text x="695" y="850" class="label">Lineage MCP</text>
  <text x="695" y="878" class="tiny">Upstream and downstream impact</text>

  <rect x="935" y="815" width="220" height="90" rx="18" class="mcp"/>
  <text x="960" y="850" class="label">Access Policy MCP</text>
  <text x="960" y="878" class="tiny">Entitlements and approval route</text>

  <rect x="1200" y="815" width="220" height="90" rx="18" class="mcp"/>
  <text x="1225" y="850" class="label">Usage Analytics MCP</text>
  <text x="1225" y="878" class="tiny">Popularity and reuse signals</text>

  <rect x="1465" y="815" width="220" height="90" rx="18" class="mcp"/>
  <text x="1490" y="850" class="label">Feedback MCP</text>
  <text x="1490" y="878" class="tiny">Issues and steward tasks</text>

  <path class="blueFlow" d="M1365 538 L1365 635"/>
  <path class="blueFlow" d="M855 635 L855 538"/>
  <path class="blueFlow" d="M250 635 L250 538"/>
  <path class="flow" d="M250 785 L250 815"/>
  <path class="flow" d="M515 785 L515 815"/>
  <path class="flow" d="M780 785 L780 815"/>
  <path class="flow" d="M1045 785 L1045 815"/>
  <path class="flow" d="M1310 785 L1310 815"/>
  <path class="flow" d="M1575 785 L1575 815"/>

  <path class="dash" d="M1575 905 C1575 970 470 970 470 310"/>
  <text x="720" y="995" class="tiny">Feedback, quality issues and usage demand route back into stewardship for remediation, product-policy changes or re-certification.</text>
</svg>
