 <rect x="675" y="705" width="250" height="66" rx="16" class="agentCard"/><text x="700" y="733" class="head">Classification &amp; Risk Agent</text><text x="700" y="758" class="body">Risk and handling proposals</text>
 <rect x="960" y="705" width="250" height="66" rx="16" class="agentCard"/><text x="985" y="733" class="head">Contract &amp; Remediation Agent</text><text x="985" y="758" class="body">Product design and actions</text>
 <rect x="1245" y="705" width="250" height="66" rx="16" class="agentCard"/><text x="1270" y="733" class="head">Publication &amp; Monitoring Agent</text><text x="1270" y="758" class="body">Metadata and impact narrative</text>
 <line x1="355" y1="738" x2="385" y2="738" class="flow"/><line x1="640" y1="738" x2="670" y2="738" class="flow"/><line x1="925" y1="738" x2="955" y2="738" class="flow"/><line x1="1210" y1="738" x2="1240" y2="738" class="flow"/>

 <text x="70" y="850" class="label">ENTERPRISE EXECUTION, INTEGRATION AND EVIDENCE</text>
 <rect x="70" y="870" width="330" height="88" rx="17" class="execCard"/><text x="105" y="907" class="head">Source and Profiling Adapters</text><text x="105" y="936" class="body">Files, APIs, tables, CDC and scalable DQ jobs</text>
 <rect x="435" y="870" width="330" height="88" rx="17" class="execCard"/><text x="470" y="907" class="head">Durable State and Artifacts</text><text x="470" y="936" class="body">PostgreSQL, object store and dependency graph</text>
 <rect x="800" y="870" width="330" height="88" rx="17" class="execCard"/><text x="835" y="907" class="head">Enterprise Data Ecosystem</text><text x="835" y="936" class="body">Catalog, MDM, DQ, lineage and lakehouse</text>
 <rect x="1165" y="870" width="365" height="88" rx="17" class="mcpCard"/><text x="1200" y="907" class="head">Outcome and Control Analytics</text><text x="1200" y="936" class="body">Acceptance, edits, defects, cycle time, reuse and value</text>
 <text x="800" y="987" text-anchor="middle" class="footer">Target boundary: durable Human-accountable control plane with secure enterprise integration and outcome learning.</text>
